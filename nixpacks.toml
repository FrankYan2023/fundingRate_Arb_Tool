[phases.setup]
nixPkgs = ["python311", "nodejs_20"]

[phases.install]
cmds = [
  "cd dashboard/backend && pip install -r requirements.txt",
  "cd dashboard/frontend && npm ci"
]

[phases.build]
cmds = ["cd dashboard/frontend && npm run build"]

[start]
cmd = "cd dashboard/backend && uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
